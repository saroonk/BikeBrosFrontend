<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BikeBros - Sign Up</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fafafb;
        }

        .auth-card {
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            border: 1px solid #f0f0f0;
        }

        .form-control {
            padding: 14px 20px;
            border-radius: 12px;
            border: 1px solid #e9ecef;
            background-color: #f8f9fa;
        }

        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(255, 193, 7, 0.15);
            border-color: #ffc107;
            background-color: #fff;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center min-vh-100 p-3">
    <div class="container" style="max-width: 450px;">
        <div class="text-center mb-4">
            <a href="index.html" class="text-decoration-none">
                <h1 class="fw-bold fs-2 fst-italic text-dark mb-0" style="letter-spacing:-1px;">BikeBros</h1>
            </a>
        </div>

        <div class="card auth-card bg-white p-4 p-md-5">
            <h2 class="fw-bold mb-3">Create Account</h2>
            <p class="text-secondary mb-4">Join BikeBros for fast, reliable doorstep bike service.</p>

            <form>
                <div class="mb-3">
                    <label class="form-label fw-semibold text-dark small">Full Name</label>
                    <input type="text" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold text-dark small">Email Address</label>
                    <input type="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold text-dark small mb-0">Password</label>
                    <input type="password" class="form-control mt-2" placeholder="Create a password" required>
                </div>
                <button type="submit" class="btn btn-warning w-100 py-3 fw-bold rounded-3 text-dark mb-4 shadow-sm">Sign
                    Up</button>
            </form>

            <div class="text-center">
                <span class="text-secondary">Already have an account?</span>
                <a href="login.html" class="text-dark fw-bold text-decoration-none">Log in</a>
            </div>
        </div>
    </div>
</body>

</html>
